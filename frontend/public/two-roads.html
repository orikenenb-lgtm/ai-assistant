<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🚗 שני כבישים</title>
<style>
  html, body { margin:0; height:100%; background:#0b1020; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener("resize", resize); resize();

  const COLORS = ["#ff5c5c","#ffd166","#4ade80","#60a5fa","#f472b6","#a78bfa","#22d3ee","#fb923c","#e2e8f0"];
  const rnd = (a, b) => a + Math.random() * (b - a);
  const pick = a => a[(Math.random() * a.length) | 0];

  // שני כבישים: עליון נוסע ימינה, תחתון נוסע שמאלה
  function roadY() {
    return { top: H * 0.33, bottom: H * 0.67, laneH: H * 0.22 };
  }
  let R = roadY();

  const cars = [];

  function spawn(road) {
    const ry = road === 0 ? R.top : R.bottom;
    const dir = road === 0 ? 1 : -1;          // עליון ימינה, תחתון שמאלה
    const w = rnd(42, 64), h = rnd(20, 28);
    cars.push({
      road, dir,
      x: dir === 1 ? -w - rnd(0, 200) : W + w + rnd(0, 200),
      y: ry + rnd(-R.laneH/2 + h, R.laneH/2 - h),
      w, h,
      speed: rnd(120, 320),
      color: pick(COLORS),
    });
  }

  // מלא כל כביש בהמון מכוניות
  for (let i = 0; i < 40; i++) { spawn(0); spawn(1); }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;

    // הוסף מכוניות חדשות כל הזמן
    if (Math.random() < 0.5) spawn(0);
    if (Math.random() < 0.5) spawn(1);

    for (let i = cars.length - 1; i >= 0; i--) {
      const c = cars[i];
      c.x += c.speed * c.dir * dt;
      if (c.dir === 1 && c.x > W + 80) cars.splice(i, 1);
      else if (c.dir === -1 && c.x < -80) cars.splice(i, 1);
    }

    draw();
    requestAnimationFrame(frame);
  }

  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawRoad(cy, label) {
    const top = cy - R.laneH/2;
    // אספלט
    ctx.fillStyle = "#1c2334";
    ctx.fillRect(0, top, W, R.laneH);
    // קצוות
    ctx.fillStyle = "#2a3450";
    ctx.fillRect(0, top, W, 4);
    ctx.fillRect(0, top + R.laneH - 4, W, 4);
    // קו אמצע מקווקו נע
    ctx.save();
    ctx.strokeStyle = "#ffd166";
    ctx.globalAlpha = 0.8;
    ctx.lineWidth = 4;
    ctx.setLineDash([34, 26]);
    ctx.lineDashOffset = -(performance.now() / 18) % 60;
    ctx.beginPath();
    ctx.moveTo(0, cy); ctx.lineTo(W, cy);
    ctx.stroke();
    ctx.restore();
  }

  function drawCar(c) {
    const y = c.y;
    ctx.save();
    ctx.shadowColor = c.color; ctx.shadowBlur = 12;
    ctx.fillStyle = c.color;
    rr(c.x, y - c.h/2, c.w, c.h, 6); ctx.fill();
    ctx.shadowBlur = 0;
    // שמשה
    ctx.fillStyle = "rgba(255,255,255,.4)";
    const wx = c.dir === 1 ? c.x + c.w*0.55 : c.x + c.w*0.15;
    rr(wx, y - c.h*0.28, c.w*0.3, c.h*0.56, 3); ctx.fill();
    // גלגלים
    ctx.fillStyle = "#0b1020";
    ctx.fillRect(c.x + c.w*0.15, y + c.h/2 - 2, c.w*0.18, 5);
    ctx.fillRect(c.x + c.w*0.67, y + c.h/2 - 2, c.w*0.18, 5);
    ctx.restore();
  }

  function draw() {
    // רקע
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0b1020"); g.addColorStop(1, "#070a14");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    drawRoad(R.top);
    drawRoad(R.bottom);

    for (const c of cars) drawCar(c);
  }

  addEventListener("resize", () => { R = roadY(); });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
