# CI של Kerem Orders — רץ על כל push ו-PR
# שלושה מסלולים: בדיקות בקנד, בדיקות RLS על PostgreSQL אמיתי, build פרונט
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: בדיקות בקנד (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  rls:
    name: בדיקות RLS (PostgreSQL 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: הרצת migrations + בדיקות בידוד נתונים
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE kerem_test;"
          psql -h localhost -U postgres -d kerem_test -v ON_ERROR_STOP=1 \
            -f supabase/tests/auth_stub.sql \
            -f supabase/migrations/20260612000000_init.sql \
            -f supabase/migrations/20260612000001_invite_linking.sql \
            -f supabase/tests/test_rls.sql

  frontend:
    name: פרונט (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
